<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Chat — Exama Lite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: { 50:'#faf9f6', 100:'#f4f2ec', 200:'#e8e4d9', 300:'#d6d0c4' },
            ink:   { 100:'#e0ddd7', 200:'#b8b3a8', 300:'#8c8679', 400:'#5e5a52', 500:'#3a3731', 600:'#27251f', 700:'#1a1814' },
            accent:{ 50:'#f0f4f8', 100:'#d9e5f0', 200:'#adc5df', 300:'#7aa3c8', 400:'#4e84b4', 500:'#2d6899', 600:'#1f5280', 700:'#153d60' },
            danger:{ 50:'#fdf0f0', 200:'#e8a0a0', 300:'#d05f5f', 400:'#b03838' },
          },
          fontFamily: {
            serif: ['"Noto Serif"', 'Georgia', 'serif'],
            sans:  ['"DM Sans"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            paper: '0 1px 3px 0 rgba(58,55,49,0.08), 0 1px 2px -1px rgba(58,55,49,0.06)',
            focus: '0 0 0 3px rgba(77,132,180,0.14)',
          },
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.7s linear infinite; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.22s ease both; }

    /* Scrollbar */
    #chat-messages::-webkit-scrollbar { width: 5px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: #d6d0c4; border-radius: 99px; }

    /* Typing dots */
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
    .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#8c8679; animation: blink 1.2s infinite; }
    .dot:nth-child(2){ animation-delay:.2s; }
    .dot:nth-child(3){ animation-delay:.4s; }
  </style>
</head>
<body class="bg-paper-50 text-ink-500 min-h-screen font-sans">

<!-- ── Navbar ── -->
<header class="sticky top-0 z-20 bg-paper-50/80 backdrop-blur border-b border-paper-200 px-5 py-3 flex items-center justify-between">
  <a href="/" class="font-serif text-[18px] font-bold text-ink-700 no-underline">Exama Lite</a>
  <div id="user-badge" class="hidden items-center gap-2 text-sm text-ink-400">
    <span class="w-2 h-2 rounded-full bg-green-400 inline-block"></span>
    <span id="user-email" class="max-w-[180px] truncate"></span>
    <button id="btn-logout" class="ml-1 text-danger-400 hover:underline text-[12px]">Đăng xuất</button>
  </div>
</header>

<!-- ── Auth wall ── -->
<div id="auth-wall" class="flex flex-col items-center justify-center min-h-[80vh] gap-4 px-4 text-center">
  <p class="text-ink-400 text-sm">Bạn cần đăng nhập để dùng tính năng này.</p>
  <a href="/login.html"
     class="inline-flex items-center gap-2 px-5 py-2.5 text-sm font-semibold text-white bg-accent-500 rounded-[6px]
            hover:bg-accent-600 transition-colors duration-150 no-underline">
    Đăng nhập
  </a>
</div>

<!-- ── Main chat UI (hidden until auth OK) ── -->
<main id="chat-app" class="hidden max-w-2xl mx-auto px-4 pb-32 pt-6">

  <!-- Header -->
  <div class="mb-6">
    <h1 class="font-serif text-2xl font-bold text-ink-700">Trợ lý Gemini</h1>
    <p class="text-sm text-ink-300 mt-1">Powered by Google Gemini · Bảo mật qua proxy</p>
  </div>

  <!-- Model selector -->
  <div class="flex items-center gap-2 mb-4">
    <label class="text-xs text-ink-300 font-medium">Model</label>
    <select id="model-select"
      class="text-xs text-ink-500 bg-white border border-paper-200 rounded-md px-2.5 py-1.5
             focus:outline-none focus:border-accent-400 focus:shadow-focus transition-all">
      <option value="gemini-2.0-flash">gemini-2.0-flash</option>
      <option value="gemini-3.1-flash-lite-preview">gemini-3.1-flash-lite-preview</option>
      <option value="gemini-1.5-flash">gemini-1.5-flash</option>
      <option value="gemini-1.5-pro">gemini-1.5-pro</option>
    </select>
  </div>

  <!-- Chat messages -->
  <div id="chat-messages" class="flex flex-col gap-4 min-h-[200px] mb-4">
    <!-- Messages rendered here -->
  </div>

  <!-- Error bar -->
  <div id="chat-error" class="hidden gap-2 items-start px-4 py-3 rounded-md border border-danger-200 bg-danger-50 text-danger-400 text-sm mb-3">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/>
    </svg>
    <span id="chat-error-text"></span>
  </div>
</main>

<!-- ── Fixed input bar ── -->
<div id="input-bar" class="hidden fixed bottom-0 inset-x-0 bg-paper-50/90 backdrop-blur border-t border-paper-200 px-4 py-3">
  <div class="max-w-2xl mx-auto flex gap-2 items-end">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Nhập câu hỏi…"
      class="flex-1 resize-none text-sm text-ink-500 bg-white border border-paper-300 rounded-[8px] px-3.5 py-2.5 outline-none
             placeholder-ink-200 focus:border-accent-400 focus:shadow-focus transition-all duration-150
             max-h-40 overflow-y-auto leading-relaxed"
    ></textarea>
    <button
      id="btn-send"
      class="flex-shrink-0 flex items-center justify-center w-10 h-10 text-white bg-accent-500 rounded-[8px] cursor-pointer border-0
             hover:bg-accent-600 active:bg-accent-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors duration-150"
    >
      <!-- Send icon -->
      <svg id="send-icon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
      </svg>
      <!-- Spinner -->
      <svg id="send-spinner" class="hidden w-4 h-4 spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" stroke-opacity="0.25"></circle>
        <path fill="white" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
      </svg>
    </button>
  </div>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const SUPABASE_URL      = 'https://tcdnpkrooeqagbmergne.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjZG5wa3Jvb2VxYWdibWVyZ25lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzEyNjcsImV4cCI6MjA5MDgwNzI2N30.GggwsOhUvztkQ2h4kGEB7ol9m0hg87PRqxND4Ms8gKA'

  // ⚠️ Thay bằng URL Edge Function thực tế của bạn sau khi deploy
  // Ví dụ: https://tcdnpkrooeqagbmergne.supabase.co/functions/v1/gemini-proxy
  const PROXY_URL = `${SUPABASE_URL}/functions/v1/gemini-proxy`

  // ── Auth state ────────────────────────────────────────────────────────────
  let accessToken  = localStorage.getItem('sb_access_token')
  let refreshToken = localStorage.getItem('sb_refresh_token')
  let currentUser  = null

  try { currentUser = JSON.parse(localStorage.getItem('sb_user') || 'null') } catch {}

  // ── Auto-refresh token if expired ─────────────────────────────────────────
  async function ensureFreshToken() {
    if (!accessToken) return false

    // Quick check: try to validate
    const check = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${accessToken}` }
    }).catch(() => null)

    if (check?.ok) return true

    // Try refresh
    if (!refreshToken) return false
    const rRes = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', apikey: SUPABASE_ANON_KEY },
      body: JSON.stringify({ refresh_token: refreshToken })
    }).catch(() => null)

    if (!rRes?.ok) return false
    const data = await rRes.json()
    accessToken  = data.access_token
    refreshToken = data.refresh_token
    currentUser  = data.user
    localStorage.setItem('sb_access_token',  accessToken)
    localStorage.setItem('sb_refresh_token', refreshToken)
    localStorage.setItem('sb_user', JSON.stringify(currentUser))
    return true
  }

  // ── Init UI ───────────────────────────────────────────────────────────────
  async function initApp() {
    const authed = await ensureFreshToken()
    if (!authed) {
      document.getElementById('auth-wall').classList.remove('hidden')
      return
    }

    document.getElementById('auth-wall').classList.add('hidden')
    document.getElementById('chat-app').classList.remove('hidden')
    document.getElementById('input-bar').classList.remove('hidden')
    document.getElementById('user-badge').classList.replace('hidden', 'flex')
    document.getElementById('user-email').textContent = currentUser?.email ?? ''
  }

  initApp()

  // ── Logout ─────────────────────────────────────────────────────────────────
  document.getElementById('btn-logout').addEventListener('click', () => {
    localStorage.removeItem('sb_access_token')
    localStorage.removeItem('sb_refresh_token')
    localStorage.removeItem('sb_user')
    window.location.reload()
  })

  // ── Chat state ────────────────────────────────────────────────────────────
  // Gemini uses "contents" array: [{role, parts:[{text}]}]
  const history = []   // { role: 'user'|'model', parts: [{text}] }[]

  // ── Render helpers ────────────────────────────────────────────────────────
  const messagesEl = document.getElementById('chat-messages')

  function appendMessage(role, text) {
    const isUser = role === 'user'
    const wrap = document.createElement('div')
    wrap.className = `flex ${isUser ? 'justify-end' : 'justify-start'} fade-in`

    const bubble = document.createElement('div')
    bubble.className = isUser
      ? 'max-w-[80%] bg-accent-500 text-white text-sm px-4 py-2.5 rounded-2xl rounded-br-sm leading-relaxed'
      : 'max-w-[80%] bg-white border border-paper-200 text-ink-500 text-sm px-4 py-2.5 rounded-2xl rounded-bl-sm leading-relaxed shadow-paper'

    bubble.textContent = text
    wrap.appendChild(bubble)
    messagesEl.appendChild(wrap)
    wrap.scrollIntoView({ behavior: 'smooth', block: 'end' })
    return bubble
  }

  function appendTyping() {
    const wrap = document.createElement('div')
    wrap.className = 'flex justify-start fade-in'
    wrap.id = 'typing-indicator'
    wrap.innerHTML = `
      <div class="bg-white border border-paper-200 px-4 py-3 rounded-2xl rounded-bl-sm shadow-paper flex gap-1 items-center">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>`
    messagesEl.appendChild(wrap)
    wrap.scrollIntoView({ behavior: 'smooth', block: 'end' })
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove()
  }

  function showError(msg) {
    const el = document.getElementById('chat-error')
    document.getElementById('chat-error-text').textContent = msg
    el.classList.remove('hidden')
    el.classList.add('flex')
    setTimeout(() => { el.classList.add('hidden'); el.classList.remove('flex') }, 6000)
  }

  // ── Send message ──────────────────────────────────────────────────────────
  const inputEl    = document.getElementById('user-input')
  const btnSend    = document.getElementById('btn-send')
  const sendIcon   = document.getElementById('send-icon')
  const sendSpin   = document.getElementById('send-spinner')
  const modelSelect = document.getElementById('model-select')

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto'
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px'
  })

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
  })
  btnSend.addEventListener('click', sendMessage)

  function setLoading(on) {
    btnSend.disabled = on
    sendIcon.classList.toggle('hidden', on)
    sendSpin.classList.toggle('hidden', !on)
  }

  async function sendMessage() {
    const text = inputEl.value.trim()
    if (!text) return

    // Fresh token check
    const authed = await ensureFreshToken()
    if (!authed) { showError('Phiên đăng nhập hết hạn. Vui lòng đăng nhập lại.'); return }

    inputEl.value = ''
    inputEl.style.height = 'auto'
    setLoading(true)

    appendMessage('user', text)
    history.push({ role: 'user', parts: [{ text }] })

    appendTyping()

    try {
      const res = await fetch(PROXY_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${accessToken}`,
        },
        body: JSON.stringify({
          model:    modelSelect.value,
          endpoint: 'generateContent',
          body: {
            contents: history,
            generationConfig: {
              temperature: 0.7,
              maxOutputTokens: 1024,
            },
          },
        }),
      })

      const data = await res.json()

      if (!res.ok) {
        const msg = data?.error?.message || data?.error || 'Lỗi từ Gemini proxy.'
        showError(msg)
        removeTyping()
        return
      }

      const replyText = data?.candidates?.[0]?.content?.parts?.[0]?.text ?? '(Không có nội dung phản hồi)'

      history.push({ role: 'model', parts: [{ text: replyText }] })
      removeTyping()
      appendMessage('model', replyText)

    } catch (err) {
      removeTyping()
      showError('Không thể kết nối tới proxy. Kiểm tra mạng và thử lại.')
      console.error(err)
    } finally {
      setLoading(false)
    }
  }
</script>
</body>
</html>
