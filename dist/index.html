<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exama Plus — Loading</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper-50: #faf9f6;
      --paper-200: #e8e4d9;
      --ink-500: #3a3731;
      --ink-600: #27251f;
      --ink-300: #8c8679;
      --accent-500: #2d6899;
      --accent-600: #1f5280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper-50);
      color: var(--ink-500);
      font-family: "DM Sans", sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-container {
      text-align: center;
      padding: 32px;
      border: 1px solid var(--paper-200);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 1px 3px rgba(58, 55, 49, 0.08);
      max-width: 400px;
      width: 90%;
    }

    .spinner {
      width: 48px;
      height: 48px;
      margin: 0 auto 24px;
      border: 3px solid var(--paper-200);
      border-top-color: var(--accent-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 14px;
      color: var(--ink-300);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 4px;
      border: 1px solid var(--paper-200);
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div class="loading-container">
    <div class="badge">Exama Plus</div>
    <div class="spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <script>
    // Kiểm tra nếu Supabase redirect về trang này kèm fragment xác thực
    if (window.location.hash && window.location.hash.includes('access_token')) {
      // Chuyển sang /login với fragment được giữ nguyên
      window.location.replace('/login' + window.location.hash);
    } else {
      // Nếu không có fragment xác thực, chuyển hướng sang /home
      window.location.replace('/home');
    }
  </script>
</body>
</html>
