              100: '#f4f2ec',

              600: '#1f5280',

          fontFamily: {
            serif: ['"Noto Serif"', 'serif'],

            paper: '0 1px 3px rgba(58,55,49,0.08)',
            'paper-md': '0 3px 8px rgba(58,55,49,0.10)',
          }
        }
      }
    }
